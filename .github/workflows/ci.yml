name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint PHP Files
        run: |
          find src public -type f -name '*.php' -print0 | xargs -0 -I{} php -l {}

      - name: Python Diagnostics
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Local Diagnostic Tests
        run: |
          python -m pip install --upgrade pip
          python test_endpoints.py || true
          python test_gcp_deployment.py || true
